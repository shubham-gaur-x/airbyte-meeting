version: "3.9"

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meeting_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # ── NVIDIA GPU passthrough (uncomment if you have an NVIDIA GPU) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  transform_service:
    build: ./transform_service
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - ollama
    volumes:
      - ./transform_service:/app

volumes:
  postgres_data:
  ollama_data:
