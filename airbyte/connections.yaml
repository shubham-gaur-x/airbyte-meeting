# Airbyte connections config — documentation only (not executable)

destination:
  name: meeting-memory-neon
  type: PostgreSQL
  ssl: require
  schema: public

connections:
  - name: gmail-to-neon
    source: Gmail
    destination: meeting-memory-neon
    streams: [messages]
    sync_mode: incremental_append_dedup
    frequency: 1hr
    webhook: true

  - name: gcal-to-neon
    source: Google Calendar
    destination: meeting-memory-neon
    streams: [events]
    sync_mode: incremental_append_dedup
    frequency: 1hr
    webhook: true
